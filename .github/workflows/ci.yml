name: CI

on:
  push:
  pull_request:

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Lint PHP files
        run: |
          find . -type f -name "*.php" -not -path "*/vendor/*" -print0 | xargs -0 -n1 php -l
      - name: Run smoke tests
        run: |
          php tests/schema_smoke.php
          php tests/workflow_smoke.php
          php tests/ocr_engine_smoke.php
          php tests/capabilities_access_smoke.php
          php tests/builder_maturity_smoke.php
          php tests/builder_validation_endpoint_smoke.php
          php tests/workflow_routing_smoke.php
          php tests/ocr_operations_smoke.php
          php tests/ocr_quality_benchmark_smoke.php
          php tests/ocr_realworld_benchmark_smoke.php
          php tests/ocr_local_replay_runner.php --json
          php tests/ocr_capture_diagnostics_smoke.php
          php tests/ocr_review_queue_filters_smoke.php
          php tests/intake_source_normalization_smoke.php
          php tests/intake_linkage_traceability_smoke.php
          php tests/resource_center_status_model_smoke.php
          php tests/intake_status_payload_smoke.php
          php tests/admin_traceability_helpers_smoke.php
          php tests/intake_trace_timeline_payload_smoke.php
          php tests/intake_trace_admin_links_smoke.php
          php tests/setup_readiness_payload_smoke.php
          php tests/system_health_snapshot_smoke.php
          php tests/forms_import_export_ops_smoke.php
          php tests/sample_template_pack_smoke.php
          php tests/uninstall_behavior_helper_smoke.php
          php tests/permissions_matrix_ops_smoke.php
          php tests/chart_routing_matching_smoke.php
          php tests/chart_routing_payloads_smoke.php
          php tests/chart_routing_actions_smoke.php
          php tests/chart_routing_secure_config_smoke.php
          php tests/chart_routing_connector_validation_smoke.php
          php tests/chart_routing_retry_state_smoke.php
          php tests/chart_routing_connector_test_capability_smoke.php
          php tests/release_version_consistency_smoke.php
          php tests/release_packaging_manifest_smoke.php
          php tests/weekly_digest_payload_smoke.php
          php tests/output_signatures_smoke.php
          php tests/tutor_integration_smoke.php

  js-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JS parseability
        run: |
          node --version
          for f in assets/js/*.js; do
            node -e "new Function(require('fs').readFileSync('$f','utf8'));"
          done
