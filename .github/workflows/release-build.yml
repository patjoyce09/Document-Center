name: Release Build

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release package
        run: |
          ./scripts/build-release.sh
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: document-center-release-zip
          path: dist/*.zip
